id: reference-advanced
scenarios:
  - id: inspect
    acts:
      - id: read
        action:
          use: action.generate
          with:
            outputs:
              kind: object
              object:
                items:
                  kind: list
                  list:
                    - kind: object
                      object:
                        id: item-123
                        kind: sample
                        status: ready
                        label: Primary
                    - kind: object
                      object:
                        id: item-456
                        kind: sample
                        status: blocked
                        label: Secondary
        expectations:
          - id: item-present
            subject:
              field: values
              path: /items
            assert:
              has_item:
                - subject:
                    path: /id
                  assert:
                    eq: item-123
                - subject:
                    path: /kind
                  assert:
                    eq: sample
        exports:
          - as: selected_status
            field: values
            path: /items
            through:
              - pick:
                  where:
                    - subject:
                        path: /id
                      assert:
                        ref: expectation.equal
                        args:
                          expected: item-123
                    - subject:
                        path: /kind
                      assert:
                        ref: expectation.equal
                        args:
                          expected: sample
              - path: /status
scenario_calls:
  - id: run
    scenario_id: inspect
