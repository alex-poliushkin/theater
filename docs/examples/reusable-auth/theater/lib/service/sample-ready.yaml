id: reusable-auth-service-lib
http:
  auth:
    service_api:
      attach:
        - bearer:
            token_slot: session_token
scenarios:
  - id: service/sample-ready
    inputs:
      session_token:
        type: string
        required: true
        sensitivity: secret
        capture: omit
    auth_bindings:
      service_api:
        slots:
          session_token:
            kind: ref
            ref: session_token
    acts:
      - id: get-sample
        action:
          use: action.http
          with:
            method: GET
            url: https://api.example.test/sample
            session: none
            auth: service_api
