id: docs-first
scenarios:
  - id: hello
    acts:
      - id: say-hello
        action:
          use: action.generate
          with:
            outputs:
              kind: object
              object:
                message:
                  kind: literal
                  value: hello
        expectations:
          - id: message
            subject:
              field: values
              path: /message
            assert:
              ref: expectation.equal
              args:
                expected:
                  kind: literal
                  value: hello
scenario_calls:
  - id: run
    scenario_id: hello
