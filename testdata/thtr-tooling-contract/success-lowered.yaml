id: tooling-smoke
scenarios:
    - id: verify-items
      inputs:
        email:
            type: string
            kinds: {}
            required: true
      acts:
        - id: fetch
          properties:
            notifications:
                inventory:
                    use: inventory.http.get
                    with:
                        session:
                            kind: literal
                            value: none
                        url:
                            kind: literal
                            value: https://api.example.test/notifications
                decorators:
                    - use: json.decode
          action:
            use: action.http
            with:
                headers:
                    kind: object
                    object:
                        Accept:
                            kind: literal
                            value: application/json
                        x-trace.id:
                            kind: literal
                            value: tooling
                method:
                    kind: literal
                    value: GET
                session:
                    kind: literal
                    value: none
                url:
                    kind: literal
                    value: https://api.example.test/notifications
          expectations:
            - id: has-notification
              subject:
                field: body
                decode: json
                path: /items
              assert:
                ref: expectation.has_item
                args:
                    where:
                        kind: list
                        list:
                            - kind: object
                              object:
                                assert:
                                    kind: object
                                    object:
                                        args:
                                            kind: object
                                            object:
                                                expected:
                                                    kind: ref
                                                    ref:
                                                        name: email
                                                        decode: ""
                                                        path: ""
                                                        through: []
                                        ref:
                                            kind: literal
                                            value: expectation.equal
                                subject:
                                    kind: object
                                    object:
                                        path:
                                            kind: literal
                                            value: /receiverAddress
                            - kind: object
                              object:
                                assert:
                                    kind: object
                                    object:
                                        args:
                                            kind: object
                                            object:
                                                expected:
                                                    kind: literal
                                                    value: Verification
                                        ref:
                                            kind: literal
                                            value: expectation.contains
                                subject:
                                    kind: object
                                    object:
                                        path:
                                            kind: literal
                                            value: /subject
          exports:
            - as: otp
              ref: null
              field: body
              decode: json
              path: /items
              through:
                - pick:
                    where:
                        - subject:
                            path: /receiverAddress
                          assert:
                            ref: expectation.equal
                            args:
                                expected:
                                    kind: ref
                                    ref:
                                        name: email
                                        decode: ""
                                        path: ""
                                        through: []
                        - subject:
                            path: /subject
                          assert:
                            ref: expectation.contains
                            args:
                                expected:
                                    kind: literal
                                    value: Verification
                - path: /body
                - regexp:
                    pattern: ([0-9]{6})
                    group: 1
scenario_calls:
    - id: verify
      scenario_id: verify-items
      bindings:
        email:
            kind: literal
            value: demo@example.test
