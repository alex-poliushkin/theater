id: tooling-smoke
scenarios:
    - id: verify-items
      inputs:
        item_id:
            type: string
            kinds: {}
            required: true
      acts:
        - id: fetch
          properties:
            item_list:
                inventory:
                    use: inventory.http.get
                    with:
                        session:
                            kind: literal
                            value: none
                        url:
                            kind: literal
                            value: https://api.example.test/items
                decorators:
                    - use: json.decode
          action:
            use: action.http
            with:
                headers:
                    kind: object
                    object:
                        Accept:
                            kind: literal
                            value: application/json
                        x-trace.id:
                            kind: literal
                            value: tooling
                method:
                    kind: literal
                    value: GET
                session:
                    kind: literal
                    value: none
                url:
                    kind: literal
                    value: https://api.example.test/items
          expectations:
            - id: has-item
              subject:
                field: body
                decode: json
                path: /items
              assert:
                ref: expectation.has_item
                args:
                    where:
                        kind: list
                        list:
                            - kind: object
                              object:
                                assert:
                                    kind: object
                                    object:
                                        args:
                                            kind: object
                                            object:
                                                expected:
                                                    kind: ref
                                                    ref:
                                                        name: item_id
                                                        decode: ""
                                                        path: ""
                                                        through: []
                                        ref:
                                            kind: literal
                                            value: expectation.equal
                                subject:
                                    kind: object
                                    object:
                                        path:
                                            kind: literal
                                            value: /id
                            - kind: object
                              object:
                                assert:
                                    kind: object
                                    object:
                                        args:
                                            kind: object
                                            object:
                                                expected:
                                                    kind: literal
                                                    value: sample
                                        ref:
                                            kind: literal
                                            value: expectation.equal
                                subject:
                                    kind: object
                                    object:
                                        path:
                                            kind: literal
                                            value: /kind
          exports:
            - as: item_label
              ref: null
              field: body
              decode: json
              path: /items
              through:
                - pick:
                    where:
                        - subject:
                            path: /id
                          assert:
                            ref: expectation.equal
                            args:
                                expected:
                                    kind: ref
                                    ref:
                                        name: item_id
                                        decode: ""
                                        path: ""
                                        through: []
                        - subject:
                            path: /kind
                          assert:
                            ref: expectation.equal
                            args:
                                expected:
                                    kind: literal
                                    value: sample
                - path: /label
                - regexp:
                    pattern: ^([A-Za-z]+)$
                    group: 1
scenario_calls:
    - id: verify
      scenario_id: verify-items
      bindings:
        item_id:
            kind: literal
            value: item-123
